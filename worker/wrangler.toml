name = "google-ai-workspace-auth"
main = "src/index.ts"
compatibility_date = "2024-10-01"

# KV namespace for storing encrypted refresh tokens.
# Create with: wrangler kv:namespace create "TOKENS"
# Then paste the returned id below.
[[kv_namespaces]]
binding = "TOKENS"
id = "e115c8728fc545dea8c791c5a2f08c18"

# Non-secret environment variables.
# Set FRONTEND_ORIGIN to the URL your frontend is served from
# (e.g. https://yourusername.github.io).
[vars]
FRONTEND_ORIGIN = "https://soloceo.github.io"
GOOGLE_CLIENT_ID = "690892597411-k6rpnlurgicngbthcf2g452rng8f4o0j.apps.googleusercontent.com"
OAUTH_SCOPES = "https://www.googleapis.com/auth/gmail.readonly https://www.googleapis.com/auth/gmail.modify https://www.googleapis.com/auth/gmail.compose https://www.googleapis.com/auth/gmail.send https://www.googleapis.com/auth/calendar.readonly https://www.googleapis.com/auth/calendar.events https://www.googleapis.com/auth/tasks https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email"

# Secrets — set via:
#   wrangler secret put GOOGLE_CLIENT_SECRET
#   wrangler secret put ENCRYPTION_KEY
#
# Generate ENCRYPTION_KEY with:
#   node -e "console.log(require('crypto').randomBytes(32).toString('base64'))"
